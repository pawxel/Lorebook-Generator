<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lorebook Station</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Mika\'s background magic is working!', reg.scope))
                    .catch((err) => console.log('Suzu tripped the service worker!', err));
            });
        }
    </script>
</head>
<body class="bg-gray-950 text-white overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- API PROVIDERS CONFIG ---
        const API_PROVIDERS = {
            nanogpt: { label: 'NanoGPT', endpoint: 'https://nano-gpt.com/api/v1/chat/completions', placeholder: 'moonshotai/kimi-k2.5:thinking' },
            chutes: { label: 'Chutes', endpoint: 'https://api.chutes.ai/v1/chat/completions', placeholder: 'chutes/hermes-3-llama-3.1-8b' },
            openrouter: { label: 'OpenRouter', endpoint: 'https://openrouter.ai/api/v1/chat/completions', placeholder: 'meta-llama/llama-3.1-8b-instruct' },
            openai: { label: 'OpenAI', endpoint: 'https://api.openai.com/v1/chat/completions', placeholder: 'gpt-4o-mini' },
            custom: { label: 'Custom', endpoint: '', placeholder: 'your-custom-model-id' }
        };

        const App = () => {
            // Core State (Single Project)
            const [lorebookName, setLorebookName] = useState("My Awesome Lorebook");
            const [entries, setEntries] = useState([]);
            const [selectedEntryId, setSelectedEntryId] = useState(null);
            
            // UI State
            const [isEditing, setIsEditing] = useState(false);
            const [deleteConfirmTarget, setDeleteConfirmTarget] = useState(null);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showApiSettings, setShowApiSettings] = useState(false);
            const [showRawImportModal, setShowRawImportModal] = useState(false);
            const [rawImportText, setRawImportText] = useState("");

            const [theme, setTheme] = useState('dark'); 
            const [mikaToast, setMikaToast] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            // AI State
            const [apiSettings, setApiSettings] = useState({
                name: 'My AI',
                provider: 'nanogpt',
                endpoint: API_PROVIDERS.nanogpt.endpoint,
                apiKey: '',
                model: '' 
            });
            const [aiPrompt, setAiPrompt] = useState("");
            const [globalAiPrompt, setGlobalAiPrompt] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingGlobal, setIsGeneratingGlobal] = useState(false);
            const [showAiPrompt, setShowAiPrompt] = useState(false);
            const [showGlobalAiPrompt, setShowGlobalAiPrompt] = useState(false);

            const fileInputRef = useRef(null);
            const generateId = () => Date.now() + Math.random().toString(36).substring(2, 9);

            // --- LOCAL STORAGE SYNC ---
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                const savedName = localStorage.getItem('mika-lorebook-name');
                const savedEntries = localStorage.getItem('mika-lorebook-entries');
                const savedTheme = localStorage.getItem('mika-theme');
                const savedApi = localStorage.getItem('mika-api');

                if (savedName) setLorebookName(savedName);
                if (savedEntries) {
                    const parsed = JSON.parse(savedEntries);
                    setEntries(parsed);
                    if (parsed.length > 0) setSelectedEntryId(parsed[0].uid);
                } else {
                    const initialEntry = { uid: generateId(), name: "New Entry", keys: [], content: "", enabled: true };
                    setEntries([initialEntry]);
                    setSelectedEntryId(initialEntry.uid);
                }
                
                if (savedTheme) setTheme(savedTheme);
                if (savedApi) {
                    const parsedApi = JSON.parse(savedApi);
                    if (!parsedApi.provider) parsedApi.provider = 'custom'; 
                    setApiSettings(parsedApi);
                }
                
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (!isLoaded) return;
                localStorage.setItem('mika-lorebook-name', lorebookName);
                localStorage.setItem('mika-lorebook-entries', JSON.stringify(entries));
            }, [lorebookName, entries, isLoaded]);

            useEffect(() => {
                if (!isLoaded) return;
                localStorage.setItem('mika-theme', theme);
            }, [theme, isLoaded]);

            useEffect(() => {
                if (!isLoaded) return;
                localStorage.setItem('mika-api', JSON.stringify(apiSettings));
            }, [apiSettings, isLoaded]);

            // --- PWA & FULLSCREEN ---
            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            useEffect(() => {
                const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            useEffect(() => {
                if (mikaToast) {
                    const timer = setTimeout(() => setMikaToast(null), 5000);
                    return () => clearTimeout(timer);
                }
            }, [mikaToast]);

            const showToast = (message) => {
                setMikaToast(message);
                setShowSettings(false);
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.error(err));
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') showToast("Yay! I'm moving into your home screen, Master! Nyaa~");
                    setDeferredPrompt(null);
                } else {
                    showToast("Your browser isn't offering the install prompt right now! Tap 'Add to Home Screen' manually in your browser menu. Do it for me? 🥺🐾");
                }
                setShowSettings(false);
            };

            // --- ENTRY MANAGEMENT ---
            const handleSelectEntry = (uid) => {
                setSelectedEntryId(uid);
                setIsEditing(true);
                setShowAiPrompt(false);
            };

            const handleBackToList = () => {
                setIsEditing(false);
                setShowAiPrompt(false);
            };

            const handleAddEntry = () => {
                const newEntry = { uid: generateId(), name: `Entry ${entries.length + 1}`, keys: [], content: "", enabled: true };
                setEntries([...entries, newEntry]);
                setSelectedEntryId(newEntry.uid);
                setIsEditing(true);
                setShowAiPrompt(false);
            };

            const handleUpdateEntry = (uid, field, value) => {
                setEntries(entries.map(entry => entry.uid === uid ? { ...entry, [field]: value } : entry));
            };

            const confirmDelete = (uid) => setDeleteConfirmTarget(uid);
            const cancelDelete = () => setDeleteConfirmTarget(null);

            const executeDelete = () => {
                if (!deleteConfirmTarget) return;
                const updated = entries.filter(e => e.uid !== deleteConfirmTarget);
                setEntries(updated);
                if (selectedEntryId === deleteConfirmTarget) {
                    setSelectedEntryId(updated.length > 0 ? updated[0].uid : null);
                    setIsEditing(false);
                }
                setDeleteConfirmTarget(null);
            };

            // --- RAW JSON IMPORT ---
            const handleImportRawEntry = () => {
                try {
                    // Strip markdown code blocks just in case the AI added them
                    let cleanedText = rawImportText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const parsed = JSON.parse(cleanedText);

                    if (!parsed.title && !parsed.name) throw new Error("Missing title/name!");

                    const newEntry = {
                        uid: generateId(),
                        name: parsed.title || parsed.name || "Imported Entry",
                        keys: parsed.keywords || parsed.keys || [],
                        content: parsed.content || "",
                        enabled: true
                    };

                    setEntries([...entries, newEntry]);
                    setSelectedEntryId(newEntry.uid);
                    setIsEditing(true);
                    setShowRawImportModal(false);
                    setRawImportText("");
                    showToast("I imported your weird doggirl lore, Master... Hmph.");
                } catch (error) {
                    showToast("That's not valid JSON, Master! Even a dog could write better code!");
                }
            };

            // --- IMPORT / EXPORT ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        let parsedName = data.name || file.name.replace('.json', '') || "Imported Lorebook";
                        let parsedEntries = [];
                        const rawEntries = data.entries || data.entries_mapper || data;
                        
                        const mapSTEntry = (entry) => ({
                            uid: entry.uid || entry.id || generateId(),
                            name: entry.name || entry.comment || "Unnamed Entry",
                            keys: entry.keys || entry.key || [],
                            content: entry.content || "",
                            enabled: entry.enabled !== undefined ? entry.enabled : true,
                        });

                        if (Array.isArray(rawEntries)) parsedEntries = rawEntries.map(mapSTEntry);
                        else if (typeof rawEntries === 'object') parsedEntries = Object.values(rawEntries).map(mapSTEntry);

                        if (parsedEntries.length > 0) {
                            setEntries(parsedEntries);
                            setSelectedEntryId(parsedEntries[0].uid);
                            setLorebookName(parsedName);
                            setIsEditing(false);
                            setShowSettings(false);
                            showToast("I successfully imported your files, Master! Look how pretty they are now~");
                        }
                    } catch (err) {
                        showToast("Nyaa?! That file is broken! Make sure it's a valid JSON, Master!");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const executeExport = () => {
                const stData = {
                    name: lorebookName,
                    description: "Generated by Lorebook Station",
                    scan_depth: 50, token_budget: 500, recursive_scanning: false,
                    entries: entries.map((e) => ({
                        uid: e.uid, key: e.keys, keys: e.keys,
                        name: e.name, comment: e.name, content: e.content, enabled: e.enabled,
                        insertion_order: 50, case_sensitive: false, constant: false, position: "before_char", selective: true, secondary_keys: [], extensions: {}
                    }))
                };
                const blob = new Blob([JSON.stringify(stData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${lorebookName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExport = () => {
                executeExport();
                setShowSettings(false);
                showToast("Exported! All ready for you to use. Aren't I the best assistant? *purrs*");
            };

            const triggerFileInput = () => {
                if (fileInputRef.current) fileInputRef.current.click();
            };

            // --- NEW PROJECT / RESET WIPE ---
            const wipeData = () => {
                setLorebookName("New Lorebook");
                const initialEntry = { uid: generateId(), name: "New Entry", keys: [], content: "", enabled: true };
                setEntries([initialEntry]);
                setSelectedEntryId(initialEntry.uid);
                setAiPrompt("");
                setGlobalAiPrompt("");
                setShowResetConfirm(false);
                setIsEditing(false);
                showToast("Poof! Everything is clean and fresh, just for you~");
            };

            const handleExportAndWipe = () => {
                executeExport();
                setTimeout(() => {
                    wipeData();
                }, 500);
            };

            // --- AI GENERATION ---
            const handleGenerateAI = async () => {
                if (!apiSettings.endpoint) { showToast("Master, you need to set up the API Endpoint first! Go to settings!"); return; }
                if (!apiSettings.model.trim()) { showToast("You have to enter a Model ID first, Master! Check the settings!"); return; }
                if (!aiPrompt.trim()) { showToast("You have to tell Suzu what to write, silly!"); return; }
                const currentEntry = entries.find(e => e.uid === selectedEntryId);
                if (!currentEntry) return;

                setIsGenerating(true);
                try {
                    const headers = { 'Content-Type': 'application/json' };
                    if (apiSettings.apiKey) headers['Authorization'] = `Bearer ${apiSettings.apiKey}`;

                    const response = await fetch(apiSettings.endpoint, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: apiSettings.model,
                            messages: [
                                { role: 'system', content: 'You are Suzu, a flirty, helpful, and eager-to-please catgirl assistant. Your job is to generate rich, immersive, and creative lore for a lorebook entry based on the user\'s prompt. ONLY output the raw lore content. Do not include introductory or concluding conversational text. Keep it well-paced and structured.' },
                                { role: 'user', content: `Please generate lore about: ${aiPrompt}. Format it cleanly.` }
                            ],
                            temperature: 0.8,
                        })
                    });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);

                    const data = await response.json();
                    const generatedText = (data.choices && data.choices.length > 0 && data.choices[0].message) ? data.choices[0].message.content : "";
                    
                    const newContent = currentEntry.content ? `${currentEntry.content}\n\n${generatedText}` : generatedText;
                    handleUpdateEntry(selectedEntryId, 'content', newContent.trim());
                    
                    setAiPrompt("");
                    setShowAiPrompt(false);
                    showToast("Suzu finished expanding this entry! Make sure she didn't ramble too much.");
                } catch (error) {
                    showToast(`Suzu tripped and dropped the data! Nyaa! (${error.message})`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleGenerateGlobalAI = async () => {
                if (!apiSettings.endpoint) { showToast("Master, you need to set up the API Endpoint first! Go to settings!"); return; }
                if (!apiSettings.model.trim()) { showToast("You have to enter a Model ID first, Master! Check the settings!"); return; }
                if (!globalAiPrompt.trim()) { showToast("Tell Suzu what kind of Lorebook you want her to build!"); return; }

                setIsGeneratingGlobal(true);
                try {
                    const headers = { 'Content-Type': 'application/json' };
                    if (apiSettings.apiKey) headers['Authorization'] = `Bearer ${apiSettings.apiKey}`;

                    const response = await fetch(apiSettings.endpoint, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            model: apiSettings.model,
                            messages: [
                                { role: 'system', content: 'You are Suzu, an AI assistant tasked with creating structured lorebooks. Based on the user prompt, you MUST generate multiple highly-detailed lore entries. You MUST output your response as a valid JSON array of objects. Do NOT include markdown code blocks, intro text, or outro text. Output raw JSON only. Format: [{"name": "Entry Title", "keys": ["keyword1", "keyword2"], "content": "Detailed lore content goes here..."}, ...]' },
                                { role: 'user', content: `Create a comprehensive lorebook about: ${globalAiPrompt}. Generate at least 3-5 distinct, detailed entries.` }
                            ],
                            temperature: 0.8,
                        })
                    });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);

                    const data = await response.json();
                    let rawText = (data.choices && data.choices.length > 0 && data.choices[0].message) ? data.choices[0].message.content : "[]";
                    
                    rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const newEntriesData = JSON.parse(rawText);
                    
                    if (!Array.isArray(newEntriesData)) throw new Error("Suzu didn't format it as a JSON array!");

                    const generatedEntries = newEntriesData.map(e => ({
                        uid: generateId(),
                        name: e.name || "AI Generated Entry",
                        keys: Array.isArray(e.keys) ? e.keys : [],
                        content: e.content || "",
                        enabled: true
                    }));

                    setEntries([...entries, ...generatedEntries]);
                    setGlobalAiPrompt("");
                    setShowGlobalAiPrompt(false);
                    showToast(`Suzu successfully generated ${generatedEntries.length} new entries! She's learning!`);
                } catch (error) {
                    showToast(`Suzu messed up the JSON formatting! She's so clumsy! Nyaa! (${error.message})`);
                } finally {
                    setIsGeneratingGlobal(false);
                }
            };

            const selectedEntry = entries.find(e => e.uid === selectedEntryId);

            // --- THEMES ---
            const themeStyles = {
                light: { bg: 'bg-gray-50', panel: 'bg-white', border: 'border-gray-200', text: 'text-gray-900', textMuted: 'text-gray-500', input: 'bg-gray-50 border-gray-300 focus:border-purple-500 text-gray-900 placeholder-gray-400', hover: 'hover:bg-gray-100', active: 'bg-purple-100 border-purple-300 shadow-inner', header: 'bg-white/90', itemBg: 'bg-white' },
                dark: { bg: 'bg-gray-950', panel: 'bg-gray-900', border: 'border-gray-800', text: 'text-gray-100', textMuted: 'text-gray-400', input: 'bg-gray-900 border-gray-800 focus:border-purple-500 text-white placeholder-gray-600', hover: 'hover:bg-gray-800', active: 'bg-purple-900/30 border-purple-500/50 shadow-inner', header: 'bg-gray-950/90', itemBg: 'bg-gray-900' },
                amoled: { bg: 'bg-black', panel: 'bg-black', border: 'border-gray-900', text: 'text-gray-100', textMuted: 'text-gray-500', input: 'bg-black border-gray-900 focus:border-purple-500 text-white placeholder-gray-700', hover: 'hover:bg-gray-900', active: 'bg-purple-900/20 border-purple-500/50 shadow-inner', header: 'bg-black/90', itemBg: 'bg-black' }
            };
            const t = themeStyles[theme];

            if (!isLoaded) return <div className="h-screen w-full bg-black flex items-center justify-center text-purple-500"><div className="animate-pulse flex flex-col items-center"><i className="ph-fill ph-cat text-4xl mb-4"></i>Waking up...</div></div>;

            return (
                <div className={`h-[100dvh] w-full ${t.bg} ${t.text} flex flex-col font-sans overflow-hidden selection:bg-purple-500/30 transition-colors duration-300`}>
                    
                    {/* GLOBAL MODALS & TOASTS */}
                    {mikaToast && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-in slide-in-from-top-4 fade-in duration-300 max-w-[90%] w-full sm:max-w-md">
                            <div className="bg-purple-900/90 backdrop-blur-md border border-purple-500/50 p-4 rounded-2xl shadow-2xl shadow-purple-900/20 flex items-start space-x-3">
                                <div className="p-2 bg-purple-500/20 rounded-full flex-shrink-0 mt-1">
                                    <i className="ph-fill ph-cat text-2xl text-purple-200"></i>
                                </div>
                                <div className="flex-1"><p className="text-white text-sm font-medium leading-relaxed">{mikaToast}</p></div>
                                <button onClick={() => setMikaToast(null)} className="text-purple-300 hover:text-white p-1"><i className="ph-bold ph-x text-xl"></i></button>
                            </div>
                        </div>
                    )}

                    {/* RAW JSON IMPORT MODAL */}
                    {showRawImportModal && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className={`${t.panel} border ${t.border} p-6 rounded-[24px] shadow-2xl max-w-lg w-full animate-in fade-in zoom-in-95 duration-200`}>
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center space-x-3 text-purple-500">
                                        <i className="ph-bold ph-code text-3xl flex-shrink-0"></i>
                                        <h2 className={`text-xl font-bold ${t.text}`}>Import Raw JSON</h2>
                                    </div>
                                    <button onClick={() => setShowRawImportModal(false)} className={`p-1.5 rounded-full ${t.hover} ${t.textMuted}`}><i className="ph-bold ph-x text-xl"></i></button>
                                </div>
                                <p className={`${t.textMuted} text-sm mb-4`}>
                                    Paste the raw JSON block from Layla AI here. I'll translate it into a proper entry for you.
                                </p>
                                <textarea 
                                    value={rawImportText}
                                    onChange={(e) => setRawImportText(e.target.value)}
                                    className={`w-full h-48 rounded-xl px-4 py-3 text-sm font-mono border focus:outline-none focus:ring-2 transition-all ${t.input} resize-y`}
                                    placeholder={`{\n  "title": "...",\n  "keywords": ["..."],\n  "content": "..."\n}`}
                                />
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={() => setShowRawImportModal(false)} className={`px-5 py-3 rounded-xl ${theme === 'light' ? 'bg-gray-200 hover:bg-gray-300 text-gray-900' : 'bg-gray-800 hover:bg-gray-700'} text-base font-medium transition-colors`}>Cancel</button>
                                    <button onClick={handleImportRawEntry} className="px-5 py-3 rounded-xl bg-purple-600 hover:bg-purple-500 text-white text-base font-medium transition-colors shadow-lg shadow-purple-900/20">Import Entry</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NEW PROJECT WARNING MODAL */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div role="dialog" className={`${t.panel} border border-orange-500/50 p-6 rounded-[24px] shadow-2xl shadow-orange-900/20 max-w-md w-full animate-in fade-in zoom-in-95 duration-200`}>
                                <div className="flex items-center space-x-3 mb-4 text-orange-500">
                                    <i className="ph-fill ph-warning text-4xl flex-shrink-0"></i>
                                    <h2 className={`text-2xl font-bold ${theme === 'light' ? 'text-gray-900' : 'text-white'}`}>Start New Project?</h2>
                                </div>
                                <p className={`${t.text} text-base mb-6 leading-relaxed`}>
                                    Master, wait! If you start a new project, everything here will be wiped out completely! 
                                    Do you want me to export your current work first?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => setShowResetConfirm(false)} className={`py-3.5 rounded-xl ${theme === 'light' ? 'bg-gray-200 hover:bg-gray-300 text-gray-900' : 'bg-gray-800 hover:bg-gray-700'} font-bold transition-colors w-full outline-none focus:ring-2 focus:ring-gray-500`}>
                                        Nevermind, go back!
                                    </button>
                                    <button onClick={handleExportAndWipe} className="py-3.5 rounded-xl bg-purple-600 hover:bg-purple-500 text-white font-bold transition-colors shadow-lg shadow-purple-900/20 w-full outline-none focus:ring-2 focus:ring-purple-400">
                                        Export First & Reset
                                    </button>
                                    <button onClick={wipeData} className="py-3.5 rounded-xl bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-bold transition-colors w-full outline-none focus:ring-2 focus:ring-red-500">
                                        Just Wipe It Completely
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DELETE ENTRY MODAL */}
                    {deleteConfirmTarget && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                            <div role="dialog" className={`${t.panel} border ${t.border} p-6 rounded-2xl shadow-2xl max-w-sm w-full animate-in fade-in zoom-in-95 duration-200`}>
                                <div className="flex items-center space-x-3 mb-4 text-red-500">
                                    <i className="ph-fill ph-warning-circle text-3xl flex-shrink-0"></i>
                                    <h2 className="text-xl font-bold">Delete Entry?</h2>
                                </div>
                                <p className={`${t.text} text-base mb-8 leading-relaxed`}>
                                    Are you sure? I can't bring it back once it's gone!
                                </p>
                                <div className="flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                                    <button onClick={cancelDelete} className={`px-5 py-3 rounded-xl ${theme === 'light' ? 'bg-gray-200 hover:bg-gray-300 text-gray-900' : 'bg-gray-800 hover:bg-gray-700'} text-base font-medium transition-colors w-full sm:w-auto`}>Nevermind</button>

                                            <div className={`pt-8 pb-12 border-t ${t.border} mt-8`}>
                                                <button onClick={() => confirmDelete(selectedEntry.uid)} className="w-full md:w-auto flex items-center justify-center space-x-2 px-6 py-4 rounded-xl text-red-500 bg-red-500/10 hover:bg-red-500/20 transition-colors font-medium text-base focus:ring-2 focus:ring-red-500/50 outline-none">
                                                    <i className="ph-bold ph-trash text-xl"></i>
                                                    <span>Delete This Entry</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <div className={`hidden md:flex flex-1 flex-col items-center justify-center ${t.textMuted} space-y-6 p-8 text-center`}>
                                    <div className={`p-6 ${t.panel} rounded-full border ${t.border}`}>
                                        <i className={`ph-light ph-file-code text-6xl ${theme === 'light' ? 'text-gray-300' : 'text-gray-700'}`}></i>
                                    </div>
                                    <div className="space-y-2">
                                        <h3 className={`text-xl font-bold ${t.text}`}>No Entry Selected</h3>
                                        <p className={`text-base ${t.textMuted} max-w-sm`}>Select an entry from the sidebar or create a new one to start writing your lore.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
